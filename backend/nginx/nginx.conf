user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}


http {
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/certs/chain.pem;


    server {
        listen 443 ssl http2;                  # Suporte para HTTP/2
        listen [::]:443 ssl http2;
        listen 443 quic reuseport;             # Suporte para HTTP/3 (QUIC)
        listen [::]:443 quic reuseport;
        server_name app;

        # Certificados SSL
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_trusted_certificate /etc/nginx/certs/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;         # TLS para HTTP/2 e HTTP/3
        ssl_prefer_server_ciphers off;

        # Configurações específicas para HTTP/3 (QUIC)
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        ssl_early_data on;                     # Early Data para QUIC
        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Alt-Svc 'h3-23=":443"; ma=86400';  # HTTP/3 advert

        # QUIC e HTTP/3 requer suporte a UDP
        error_page 497  https://$host$request_uri;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://92.112.178.6:3001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 5M;
        }
    }
}